<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BLS B-1a Employment Analysis{% endblock %}</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">BLS Employment Analysis</a>
    <span class="navbar-text text-light small">
      B-1a: Employees on Nonfarm Payrolls by Industry
    </span>
  </div>
</nav>

<div class="container-fluid px-3 py-3">
  {% block content %}{% endblock %}
</div>

<footer class="bg-light border-top mt-4 py-3 text-center text-muted small">
  Data source: U.S. Bureau of Labor Statistics, Current Employment Statistics (CES).
  Not an official BLS publication.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
